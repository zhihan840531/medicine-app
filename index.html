  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #E8DDD0; font-family: Georgia, "Times New Roman", serif; }
    #root { min-height: 100vh; }
    @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
    @keyframes shuffle {
      0%{transform:translateX(0) rotate(0deg)}
      30%{transform:translateX(48px) rotate(10deg)}
      60%{transform:translateX(-28px) rotate(-7deg)}
      100%{transform:translateX(0) rotate(0deg)}
    }
    @keyframes revealCard { from{transform:rotateY(160deg) scale(0.85);opacity:0}to{transform:rotateY(0deg) scale(1);opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
    @keyframes softGlow {
      0%,100%{box-shadow:0 4px 24px rgba(156,132,114,0.2)}
      50%{box-shadow:0 6px 40px rgba(95,120,123,0.3)}
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    textarea:focus { outline: none; }
    textarea::placeholder { color: rgba(156,132,114,0.5); }
    .tb { transition: all 0.22s; cursor: pointer; border: none; }
    .tb:hover { filter: brightness(0.93); transform: translateY(-1px); }
    .tb:active { transform: translateY(0); }
  </style>

async function callClaude(prompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const raw = await response.text();
  let data;
  try { data = JSON.parse(raw); } catch(e) { throw new Error("回應無法解析"); }
  if (!response.ok) throw new Error("HTTP " + response.status + ": " + (data?.error?.message || ""));
  if (Array.isArray(data.content)) {
    const t = data.content.map(function(b){ return b.text || ""; }).join("");
    if (t) return t;
  }
  throw new Error("未知格式");
}

const { useState } = React;

const C = {
  bg: "#E8DDD0", bgCard: "#D4C4B0", accent1: "#9C8472", accent2: "#5F787B",
  text: "#5C4A3A", textSoft: "#9C8472", positive: "#6B8F71", reversed: "#9C6B5A",
  border: "rgba(156,132,114,0.3)",
};

function App() {
  const [question, setQuestion] = useState("");
  const [phase, setPhase] = useState("input");
  const [drawnCard, setDrawnCard] = useState(null);
  const [isReversed, setIsReversed] = useState(false);
  const [aiReading, setAiReading] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState("");
  const shuffleIdx = [0,3,7,12,16,19,21];

  function handleShuffle() {
    if (!question.trim()) return;
    setPhase("shuffling");
    setAiReading(""); setAiError("");
    setTimeout(function() {
      setDrawnCard(TAROT_CARDS[Math.floor(Math.random() * TAROT_CARDS.length)]);
      setIsReversed(Math.random() > 0.6);
      setPhase("reveal");
    }, 2200);
  }

  async function handleAiReading() {
    if (!drawnCard) return;
    setAiLoading(true); setAiReading(""); setAiError("");
    try {
      const position = isReversed ? "逆位" : "正位";
      const baseReading = isReversed ? drawnCard.reversed : drawnCard.upright;
      const prompt = "你是一位溫柔而有智慧的塔羅牌占卜師。\n\n用戶的問題是：「" + question + "」\n抽到的牌：" + position + "的「" + drawnCard.name + "」（" + drawnCard.nameEn + "）\n基本牌義：" + baseReading + "\n\n請根據用戶的具體問題，給出一段個人化的深度解讀（約120字）。語氣溫暖、直接，像朋友對話一樣，不要太文言。不要重複基本牌義，而是把牌義與他的問題結合，給出具體的洞見或建議。";
      const text = await callClaude(prompt);
      setAiReading(text);
    } catch(e) {
      setAiError(e.message);
    }
    setAiLoading(false);
  }

  function handleReset() {
    setQuestion(""); setPhase("input"); setDrawnCard(null);
    setAiReading(""); setAiError("");
  }

  const s = {
    page: { minHeight:"100vh", background:C.bg, color:C.text, display:"flex", flexDirection:"column", alignItems:"center", padding:"28px 20px" },
    panel: { background:C.bgCard, border:"1px solid "+C.border, borderRadius:"16px", padding:"24px", boxShadow:"0 2px 18px rgba(92,74,58,0.07)" },
  };

  return React.createElement("div", { style: s.page },

    // Header
    React.createElement("div", { style:{ textAlign:"center", marginBottom:"30px" } },
      React.createElement("div", { style:{ fontSize:"11px", letterSpacing:"5px", color:C.textSoft, marginBottom:"8px" } }, "ORACLE · 占卜"),
      React.createElement("h1", { style:{ fontSize:"clamp(24px,5vw,36px)", fontWeight:"normal", margin:0, letterSpacing:"4px", color:C.text } }, "塔羅占卜"),
      React.createElement("div", { style:{ width:"44px", height:"1px", background:C.accent1, margin:"10px auto" } }),
      React.createElement("p", { style:{ fontSize:"12px", color:C.textSoft, margin:0, letterSpacing:"2px" } }, "以牌問心，以星引路")
    ),

    // INPUT
    phase === "input" && React.createElement("div", { style:{ width:"100%", maxWidth:"440px", animation:"fadeUp 0.5s ease" } },
      React.createElement("div", { style: s.panel },
        React.createElement("label", { style:{ display:"block", fontSize:"12px", letterSpacing:"2px", color:C.textSoft, marginBottom:"10px" } }, "你的問題"),
        React.createElement("textarea", {
          value: question,
          onChange: function(e){ setQuestion(e.target.value); },
          placeholder: "在心中默想你的問題，然後寫下來...",
          rows: 4,
          style:{ width:"100%", background:C.bg, border:"1px solid "+C.border, borderRadius:"8px", color:C.text, fontSize:"15px", padding:"12px", resize:"none", lineHeight:"1.75", fontFamily:"inherit" },
          onFocus: function(e){ e.target.style.borderColor="rgba(95,120,123,0.55)"; },
          onBlur: function(e){ e.target.style.borderColor=C.border; },
        }),
        React.createElement("button", {
          className:"tb", onClick: handleShuffle, disabled: !question.trim(),
          style:{ marginTop:"16px", width:"100%", padding:"13px", background: question.trim() ? C.accent1 : "rgba(156,132,114,0.2)", borderRadius:"8px", color: question.trim() ? "#F5EFE8" : "rgba(156,132,114,0.45)", fontSize:"14px", letterSpacing:"3px", fontFamily:"inherit" }
        }, "抽取塔羅牌")
      ),
      React.createElement("div", { style:{ display:"flex", justifyContent:"center", gap:"14px", marginTop:"26px" } },
        [0,3,7].map(function(idx,i){
          return React.createElement("div", { key:i, style:{ width:"52px", height:"80px", borderRadius:"6px", overflow:"hidden", border:"1px solid "+C.border, boxShadow:"0 3px 10px rgba(92,74,58,0.1)", opacity:0.72, animation:"float "+(3+i*0.8)+"s ease-in-out "+(i*0.3)+"s infinite" } },
            React.createElement("img", { src: TAROT_CARDS[idx].img, style:{ width:"100%", height:"100%", objectFit:"cover" } })
          );
        })
      )
    ),

    // SHUFFLING
    phase === "shuffling" && React.createElement("div", { style:{ textAlign:"center" } },
      React.createElement("p", { style:{ fontSize:"13px", letterSpacing:"3px", color:C.textSoft, marginBottom:"30px" } }, "洗牌中，凝聚你的意念…"),

            React.createElement("img", { src: TAROT_CARDS[ci].img, style:{ width:"100%", height:"100%", objectFit:"cover" } })
          );
        })
      )
    ),

    // REVEAL
    phase === "reveal" && drawnCard && React.createElement("div", { style:{ width:"100%", maxWidth:"440px", animation:"fadeUp 0.6s ease" } },
      React.createElement("p", { style:{ textAlign:"center", fontSize:"11px", letterSpacing:"4px", color:C.textSoft, marginBottom:"18px", textTransform:"uppercase" } }, "命運之牌"),

      React.createElement("div", { style:{ textAlign:"center", marginBottom:"16px" } },
        React.createElement("div", { style:{ width:"160px", height:"240px", margin:"0 auto", borderRadius:"12px", overflow:"hidden", border:"1px solid rgba(156,132,114,0.45)", boxShadow:"0 8px 28px rgba(92,74,58,0.16)", transform: isReversed ? "rotate(180deg)" : "none", animation:"revealCard 0.7s ease, softGlow 3.5s ease infinite", display:"inline-block" } },
          React.createElement("img", { src: drawnCard.img, style:{ width:"100%", height:"100%", objectFit:"cover" } })
        )
      ),

      React.createElement("div", { style:{ textAlign:"center", marginBottom:"14px" } },
        React.createElement("div", { style:{ fontSize:"20px", letterSpacing:"2px", color:C.text, marginBottom:"3px" } }, drawnCard.name),
        React.createElement("div", { style:{ fontSize:"11px", color:C.textSoft, letterSpacing:"1px", marginBottom:"9px" } }, drawnCard.nameEn),
        React.createElement("span", { style:{ display:"inline-block", padding:"4px 16px", background: isReversed ? "rgba(156,107,90,0.12)" : "rgba(107,143,113,0.12)", border:"1px solid "+(isReversed ? "rgba(156,107,90,0.38)" : "rgba(107,143,113,0.38)"), borderRadius:"20px", fontSize:"12px", letterSpacing:"2px", color: isReversed ? C.reversed : C.positive } }, isReversed ? "逆位" : "正位")
      ),

      React.createElement("div", { style:{ padding:"10px 16px", background:C.bgCard, border:"1px solid "+C.border, borderRadius:"8px", marginBottom:"14px", fontSize:"12px", color:C.textSoft, lineHeight:"1.6" } }, "「", question, "」"),

      React.createElement("div", { style:{ padding:"16px 18px", background: isReversed ? "rgba(156,107,90,0.07)" : "rgba(107,143,113,0.07)", border:"1px solid "+(isReversed ? "rgba(156,107,90,0.2)" : "rgba(107,143,113,0.2)"), borderRadius:"10px", marginBottom:"14px" } },
        React.createElement("div", { style:{ fontSize:"11px", letterSpacing:"2px", color: isReversed ? C.reversed : C.positive, marginBottom:"7px" } }, isReversed ? "逆位牌義" : "正位牌義"),
        React.createElement("p", { style:{ fontSize:"14px", lineHeight:"1.85", color:C.text, margin:0 } }, isReversed ? drawnCard.reversed : drawnCard.upright)
      ),

      !aiReading && !aiLoading && !aiError && React.createElement("button", {
        className:"tb", onClick: handleAiReading,
        style:{ width:"100%", padding:"13px", marginBottom:"14px", background:C.accent2, borderRadius:"10px", color:"#F0EDE8", fontSize:"13px", letterSpacing:"2px", fontFamily:"inherit", boxShadow:"0 2px 12px rgba(95,120,123,0.25)" }
      }, "✦ 詢問 AI 深度解讀"),

      aiLoading && React.createElement("div", { style:{ padding:"16px", textAlign:"center", background:"rgba(95,120,123,0.06)", border:"1px solid rgba(95,120,123,0.18)", borderRadius:"10px", marginBottom:"14px" } },
        React.createElement("div", { style:{ width:"18px", height:"18px", border:"2px solid rgba(95,120,123,0.3)", borderTopColor:C.accent2, borderRadius:"50%", margin:"0 auto 8px", animation:"spin 0.8s linear infinite" } }),
        React.createElement("div", { style:{ fontSize:"12px", color:C.textSoft, letterSpacing:"1px" } }, "AI 解讀中…")
      ),

      aiReading && React.createElement("div", { style:{ padding:"16px 18px", background:"rgba(95,120,123,0.07)", border:"1px solid rgba(95,120,123,0.22)", borderRadius:"10px", marginBottom:"14px" } },
        React.createElement("div", { style:{ fontSize:"11px", letterSpacing:"2px", color:C.accent2, marginBottom:"7px" } }, "AI 深度解讀"),
        React.createElement("p", { style:{ fontSize:"14px", lineHeight:"1.9", color:C.text, margin:0 } }, aiReading)
      ),

      aiError && React.createElement("div", { style:{ padding:"12px 16px", background:"rgba(156,107,90,0.07)", border:"1px solid rgba(156,107,90,0.25)", borderRadius:"10px", marginBottom:"14px", fontSize:"12px", color:C.reversed, lineHeight:"1.6" } },
        "⚠️ " + aiError,
        React.createElement("button", { className:"tb", onClick: handleAiReading, style:{ display:"block", marginTop:"8px", padding:"6px 14px", background:"rgba(156,107,90,0.15)", borderRadius:"6px", color:C.reversed, fontSize:"12px", fontFamily:"inherit" } }, "重試")
      ),

      React.createElement("button", {
        className:"tb", onClick: handleReset,
        style:{ width:"100%", padding:"12px", background:C.bgCard, border:"1px solid "+C.border, borderRadius:"8px", color:C.textSoft, fontSize:"13px", letterSpacing:"3px", fontFamily:"inherit" }
      }, "再問一次")
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
